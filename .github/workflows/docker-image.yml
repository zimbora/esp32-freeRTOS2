name: CI/CD Workflow

on:
  push:          # Triggers on push events (to any branch)
    branches:
      - '**'     # Matches all branches (you can also use '*' for all branches)
    tags:
      - '**'     # Triggers on tag creation
  release:
    types: [published]  # Only triggers for published (non-draft) releases

jobs:
  set-matrix:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.set-build.outputs.build }}
    steps:
      - name: Determine build environments
        id: set-build
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            # On release publication, build all three environments
            echo 'build=["dev","staging","prod"]' >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Tag pushes produce a staging build for pre-release validation
            echo 'build=["staging"]' >> $GITHUB_OUTPUT
          else
            # Regular branch pushes produce a dev build for development testing
            echo 'build=["dev"]' >> $GITHUB_OUTPUT
          fi

  docker:
    needs: set-matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board: [esp32, esp32c5]
        build: ${{ fromJson(needs.set-matrix.outputs.build) }}
    env:
      BASE_DIR: /root
      PROJECT: esp32-freeRTOS2
      SKETCH: esp32-freeRTOS2
      APP: demo
      BUILD: ${{ matrix.build }}
      CONTAINER: deploy-freertos-${{ matrix.board }}-${{ matrix.build }}
      CONTAINERTAG: freertos-${{ matrix.board }}-${{ matrix.build }}

    steps:
    - name: Set Project
      run: |
        echo "Using project $PROJECT"
        echo "Using board ${{ matrix.board }}"
        echo "Using build $BUILD"

    - name: Checkout repository
      uses: actions/checkout@v3
        
    - name: Build Docker image
      run: |
        docker build \
        -f Dockerfile \
        --build-arg BASE_DIR=${BASE_DIR} \
        --build-arg PROJECT=${PROJECT} \
        --build-arg APP=${APP} \
        --build-arg BUILD=${BUILD} \
        --build-arg BOARD=${{ matrix.board }} \
        -t $CONTAINERTAG .

    - name: Run script inside Docker container
      run: |
        docker run --name $CONTAINER $CONTAINERTAG
        docker cp ${CONTAINER}:${SKETCH}/images/ ./images/

    - uses: actions/upload-artifact@v4
      with:
        name: images-${{ matrix.board }}-${{ matrix.build }}
        path: ./images
        
    - name: Update Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./images/*
        token: ${{ secrets.GITHUB_TOKEN }}
      if: github.event_name == 'release'

    - name: Clean up
      run: |
        docker rm $CONTAINER